# Namespaces for the microservices platform

---
# Infrastructure namespace for shared services
apiVersion: v1
kind: Namespace
metadata:
  name: infrastructure
  labels:
    name: infrastructure
    environment: production
    managed-by: helm
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# Application namespace for microservices
apiVersion: v1
kind: Namespace
metadata:
  name: application
  labels:
    name: application
    environment: production
    managed-by: helm
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# Monitoring namespace for observability stack
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    environment: production
    managed-by: helm
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline

---
# Worker namespace for background jobs
apiVersion: v1
kind: Namespace
metadata:
  name: worker
  labels:
    name: worker
    environment: production
    managed-by: helm
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
