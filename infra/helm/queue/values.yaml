replicaCount: 1

image:
  repository: bitnami/kafka
  tag: "3.7.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "kafka"
  automountServiceAccountToken: false

service:
  type: ClusterIP
  clientPort: 9092
  controllerPort: 9093

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

auth:
  username: "app"
  password: "change-me"
  clusterId: "k8s-test-cluster"

metrics:
  exporter:
    enabled: true
    image:
      repository: danielqsj/kafka-exporter
      tag: "1.7.0"
      pullPolicy: IfNotPresent
    port: 9308

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

podSecurityContext:
  runAsUser: 1001
  runAsNonRoot: true
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  namespace: monitoring
