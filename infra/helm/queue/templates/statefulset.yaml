apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "queue.fullname" . }}
  labels:
    {{- include "queue.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "queue.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "queue.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "queue.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: broker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kafka
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@{{ include "queue.fullname" . }}-0.{{ include "queue.fullname" . }}:{{ .Values.service.controllerPort }}"
            - name: KAFKA_CFG_LISTENERS
              value: "CLIENT://:{{ .Values.service.clientPort }},CONTROLLER://:{{ .Values.service.controllerPort }}"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "CLIENT://{{ include "queue.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.clientPort }}"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CLIENT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
              value: "CLIENT"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_SASL_ENABLED_MECHANISMS
              value: "PLAIN"
            - name: KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL
              value: "PLAIN"
            - name: KAFKA_CLIENT_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "queue.fullname" . }}-secret
                  key: KAFKA_USERNAME
            - name: KAFKA_CLIENT_PASSWORDS
              valueFrom:
                secretKeyRef:
                  name: {{ include "queue.fullname" . }}-secret
                  key: KAFKA_PASSWORD
            - name: KAFKA_INTER_BROKER_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "queue.fullname" . }}-secret
                  key: KAFKA_USERNAME
            - name: KAFKA_INTER_BROKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "queue.fullname" . }}-secret
                  key: KAFKA_PASSWORD
            - name: KAFKA_KRAFT_CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "queue.fullname" . }}-secret
                  key: KAFKA_CLUSTER_ID
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
          ports:
            - name: client
              containerPort: {{ .Values.service.clientPort }}
            - name: controller
              containerPort: {{ .Values.service.controllerPort }}
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
