apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "worker.fullname" . }}-config
  labels:
    {{- include "worker.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  KAFKA_TOPIC: {{ .Values.config.kafkaTopic | quote }}
  PREFETCH_COUNT: {{ .Values.config.prefetchCount | quote }}
  SIMULATE_WORK_MS: {{ .Values.config.simulateWorkMs | quote }}
  VALKEY_HOST: "valkey-master.infrastructure.svc.cluster.local"
  VALKEY_PORT: "6379"
  VALKEY_DB: "0"
