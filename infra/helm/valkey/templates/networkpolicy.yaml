{{- if .Values.networkPolicy.enabled }}
apiVersion: {{ include "valkey.networkPolicy.apiVersion" . }}
kind: NetworkPolicy
metadata:
  name: {{ include "valkey.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    # Custom ingress rules from values
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    # Default: allow from same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    {{- if .Values.metrics.enabled }}
    # Allow traffic on metrics port from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9121
    {{- end }}
    {{- if .Values.sentinel.enabled }}
    # Allow traffic on Sentinel port from same deployment
    - from:
        - podSelector:
            matchLabels:
              {{- include "valkey.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 26379
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress }}
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
    {{- else }}
    # Default: allow same namespace and DNS
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
{{- end }}
