name: ci-cd

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Run API tests
        run: pytest services/api/tests

      - name: Install Worker deps
        run: |
          pip install -r services/worker/requirements.txt

      - name: Run Worker tests
        run: pytest services/worker/tests

      - name: Build API image
        run: docker build -t registry.example.com/k8s-test/api:sha-${{ github.sha }} services/api

      - name: Build Worker image
        run: docker build -t registry.example.com/k8s-test/worker:sha-${{ github.sha }} services/worker

      - name: Scan images (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: registry.example.com/k8s-test/api:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          vuln-type: "os,library"

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy Queue
        run: |
          helm upgrade --install kafka infra/helm/queue -n infrastructure --create-namespace

      - name: Deploy Valkey
        run: |
          helm upgrade --install valkey infra/helm/valkey -n infrastructure

      - name: Deploy API
        run: |
          helm upgrade --install api infra/helm/api -n application --create-namespace

      - name: Deploy Worker
        run: |
          helm upgrade --install worker infra/helm/worker -n worker --create-namespace

      - name: Validate rollout
        run: |
          kubectl rollout status deployment/api-api -n application
          kubectl rollout status deployment/worker-worker -n worker

      - name: Smoke tests
        run: |
          kubectl -n application port-forward svc/api-api 8080:80 &
          sleep 3
          curl -f http://localhost:8080/health
